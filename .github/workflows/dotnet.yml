name: dotnet-check

on:
  workflow_dispatch:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup DotNet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10"
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore dependencies
        run: dotnet restore "SharpPersistence.slnx" --locked-mode

      - name: Build
        run: dotnet build "SharpPersistence.slnx" --configuration Release --no-restore

      - name: Run tests
        run: dotnet test "SharpPersistence.slnx" --configuration Release --no-build --no-restore --verbosity normal